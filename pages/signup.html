<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up Form</title>
  <link rel="stylesheet" href="./../styles/style.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="nav-logo" href="./../index.html">FRONTEND HACKATHON</a>
      <ul class="nav-links">
        <li class="nav-item"><a href="./../index.html">HOME</a></li>
        <li class="nav-item"><a href="./award.html">AWARD</a></li>
        <li class="nav-item"><a href="./schedule.html">SCHEDULE</a></li>
        <li class="nav-item"><a href="./contact.html">CONTACT</a></li>
      </ul>
      <a href="./signup.html"><button class="nav-button">SIGN UP</button></a>
    </nav>
  </header>
  <main>
  
    <div class="Join">
<h1>
  Join The Hackathon Now!
</h1>
<h5>
  Assemble your team, push your limits, and build the future of the web in 48 hours.
</h5>

<form>
  <label for="team">Team name:</label>
  <input type="text" id="team" name="team" required />

  <label for="first-name">First Team Member Name:</label>
  <input type="text" id="first-name" name="first-name" required />

  <label for="first-teammember">First Team Member Email:</label>
  <input type="email" id="first-teammember" name="first-teammember" required />

  <label for="github">First Team Member Github Username:</label>
  <input type="text" id="github" name="github" required />


  <label for="second-teammember">Second Team Member Email:</label>
  <input type="email" id="second-teammember" name="second-teammember" />


  <label for="github2">Second Team Member Github Username:</label>
  <input type="text" id="github2" name="github2" />

  <label for="second-name">Third Team Member Name:</label>
  <input type="text" id="second-name" name="second-name" />

  <label for="third-teammember">Third Team Member Email:</label>
  <input type="email" id="third-teammember" name="third-teammember" /> 

  <label for="github3">Third Team Member Github Username:</label>
  <input type="text" id="github3" name="github3" />

  <label for="team-question">Why do you think your team should participate in the hackathon?</label>
  <textarea id="team-question" name="team-question" rows="4" cols="50" required></textarea>

</form>


</div>
  </main>
  <footer>
  </footer>


</body>
</html>
